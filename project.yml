name: DoodlAR
options:
  bundleIdPrefix: com.doodlar
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: 1
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"

targets:
  DoodlAR:
    type: application
    platform: iOS
    sources:
      - path: DoodlAR
        excludes:
          - "Resources/Textures/**"
          - "Resources/Audio/**"
    info:
      path: DoodlAR/Info.plist
      properties:
        NSCameraUsageDescription: "DoodlAR needs camera access to detect your drawings and create AR creatures."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.doodlar.app
        INFOPLIST_FILE: DoodlAR/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"

  DoodlARTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DoodlARTests
    dependencies:
      - target: DoodlAR
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.doodlar.app.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DoodlAR.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DoodlAR"
        BUNDLE_LOADER: "$(TEST_HOST)"
